{% extends "base.html" %}

{% block content %}
<h1>Create Student Profile</h1>

<form method="POST">
    <label>Name</label>
    <input type="text" name="name" placeholder="Example: Lucas" required>

    <label>Major</label>
    <input type="text" name="major" placeholder="Example: Economics" required>

    <label>Research Interests</label>
    <textarea name="interests" placeholder="Example: finance, behavioral economics, data analysis" required></textarea>

    <button type="submit">Create Profile</button>
</form>
{% endblock %}
